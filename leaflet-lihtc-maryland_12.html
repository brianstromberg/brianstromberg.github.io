<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIHTC and Shared Equity</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #1a1a18;
      --paper:   #ffffff;
      --card:    #edeae2;
      --muted:   #8a8880;
      --accent:  #b85c38;
      --rule:    rgba(26,26,24,.12);
      --sidebar: 300px;
    }

    html, body { width: 100%; height: 100%; background: var(--paper); font-family: 'DM Mono', monospace; color: var(--ink); }

    /* ── Layout ── */
    .shell {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      grid-template-rows: 48px 1fr 32px;
      grid-template-areas:
        "header header"
        "sidebar map"
        "footer footer";
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      grid-area: header;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
      z-index: 1000;
    }
    .brand { font-family: 'Fraunces', serif; font-weight: 300; font-size: 17px; color: var(--ink); }
    .brand em { font-style: italic; color: var(--accent); }
    .meta { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }

    /* ── Sidebar ── */
    aside {
      grid-area: sidebar;
      border-right: 1px solid var(--rule);
      overflow-y: auto;
      background: var(--paper);
      scrollbar-width: none;
      z-index: 500;
    }
    aside::-webkit-scrollbar { display: none; }

    .sidebar-section { padding: 16px 20px; border-bottom: 1px solid var(--rule); }
    .sidebar-label {
      font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }

    /* ── Search input ── */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 8px 10px 8px 28px;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 3px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap::before {
      content: '⌕';
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      font-size: 13px; color: var(--muted); pointer-events: none;
    }

    /* ── County dropdown ── */
    .county-results {
      margin-top: 6px;
      border: 1px solid var(--rule);
      border-radius: 3px;
      background: var(--paper);
      overflow: hidden;
      display: none;
    }
    .county-results.visible { display: block; }
    .county-result-item {
      padding: 8px 12px;
      font-size: 11px;
      cursor: pointer;
      border-bottom: 1px solid var(--rule);
      transition: background .1s;
    }
    .county-result-item:last-child { border-bottom: none; }
    .county-result-item:hover { background: var(--card); }
    .county-result-item.selected { color: var(--accent); background: var(--card); }

    /* ── County chip ── */
    .county-chip {
      display: none;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 5px 10px;
      background: var(--accent);
      border-radius: 3px;
      font-size: 10px;
      color: var(--paper);
      letter-spacing: .04em;
    }
    .county-chip.visible { display: flex; }
    .county-chip-clear {
      cursor: pointer; font-size: 14px; line-height: 1;
      opacity: .7; margin-left: 8px;
    }
    .county-chip-clear:hover { opacity: 1; }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex; gap: 0;
    }
    .stat {
      flex: 1;
      padding: 10px 12px;
      border-right: 1px solid var(--rule);
    }
    .stat:last-child { border-right: none; }
    .stat-value { font-size: 16px; font-family: 'Fraunces', serif; font-weight: 300; color: var(--ink); }
    .stat-label { font-size: 8px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }

    /* ── Map ── */
    #map { grid-area: map; width: 100%; height: 100%; }

    /* ── Loading overlay ── */
    #loading {
      position: absolute;
      inset: 48px 0 32px var(--sidebar);
      background: var(--paper);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 2000;
      pointer-events: none;
      transition: opacity .4s ease;
    }
    #loading.hidden { opacity: 0; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      position: absolute;
      top: 60px; left: calc(var(--sidebar) + 20px);
      background: var(--ink); color: var(--paper);
      padding: 8px 16px; font-size: 10px; letter-spacing: .06em;
      border-radius: 3px; z-index: 3000;
    }

    /* ── Marker dot — color set inline per feature ── */
    .dot-marker { transition: transform .12s ease; }
    .dot-marker:hover { transform: scale(1.6); }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: var(--paper) !important;
      border: 1px solid var(--rule) !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 24px rgba(26,26,24,.12) !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { top: 8px !important; right: 8px !important; color: var(--muted) !important; font-size: 14px !important; }
    .popup-inner { padding: 14px 18px 12px; min-width: 200px; max-width: 260px; }
    .popup-name {
      font-family: 'Fraunces', serif; font-size: 14px; font-weight: 400;
      color: var(--ink); margin-bottom: 6px; padding-right: 16px; line-height: 1.3;
    }
    .popup-row {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); letter-spacing: .04em;
      padding: 3px 0; border-bottom: 1px solid var(--rule);
    }
    .popup-row:last-of-type { border-bottom: none; }
    .popup-row span:last-child { color: var(--ink); font-weight: 500; }
    .popup-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .popup-tag {
      display: inline-block; padding: 2px 6px;
      background: var(--card); border: 1px solid var(--rule);
      border-radius: 2px; font-size: 8px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
    }
    .popup-tag.accent { background: var(--accent); border-color: var(--accent); color: var(--paper); }

    /* ── Leaflet chrome ── */
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom {
      border: 1px solid var(--rule) !important; border-radius: 4px !important; box-shadow: none !important;
    }
    .leaflet-control-zoom a {
      background: var(--paper) !important; color: var(--ink) !important;
      border-bottom: 1px solid var(--rule) !important;
      font-family: 'DM Mono', monospace !important;
      font-size: 16px !important; line-height: 28px !important;
      width: 28px !important; height: 28px !important;
    }
    .leaflet-control-zoom a:hover { background: var(--ink) !important; color: var(--paper) !important; }
    .leaflet-control-zoom-out { border-bottom: none !important; }

    /* ── Footer ── */
    footer {
      grid-area: footer;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-top: 1px solid var(--rule); background: var(--paper);
    }
    footer span { font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    /* ── Population chart ── */
    .pop-chart { display: flex; flex-direction: column; gap: 7px; }
    .pop-row { display: flex; flex-direction: column; gap: 3px; }
    .pop-header { display: flex; justify-content: space-between; align-items: baseline; }
    .pop-name { font-size: 9px; letter-spacing: .04em; color: var(--ink); text-transform: uppercase; }
    .pop-pct  { font-size: 9px; color: var(--muted); }
    .pop-track {
      height: 4px; background: var(--card);
      border-radius: 2px; overflow: hidden;
    }
    .pop-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px;
      transition: width .45s cubic-bezier(.4,0,.2,1);
    }
    .pop-none { font-size: 10px; color: var(--muted); font-style: italic; }

    /* ── Layer toggles ── */
    .layer-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      transition: opacity .12s;
    }
    .layer-toggle:last-child { border-bottom: none; }
    .layer-toggle:hover { opacity: .7; }
    .layer-toggle.off { opacity: .35; }
    .layer-swatch {
      width: 10px; height: 10px; flex-shrink: 0; border-radius: 50%;
    }
    .lihtc-swatch { background: transparent; border: 1.5px solid var(--ink); box-shadow: none; }
    .clt-swatch {
      background: #2a6096;
      border-radius: 0;
      width: 10px; height: 10px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      box-shadow: none;
    }
    .layer-name { font-size: 11px; flex: 1; }
    .layer-badge { font-size: 9px; color: var(--muted); letter-spacing: .06em; }
  </style>
</head>
<body>

<div class="shell">

  <header>
    <div class="brand">LIHTC and Shared Equity</div>
    <div class="meta" id="count">Loading…</div>
  </header>

  <aside>

    <!-- County search -->
    <div class="sidebar-section">
      <div class="sidebar-label">County</div>
      <div class="search-wrap">
        <input type="text" id="county-search" placeholder="Search Maryland counties…" autocomplete="off" />
      </div>
      <div class="county-results" id="county-results"></div>
      <div class="county-chip" id="county-chip">
        <span id="county-chip-name">—</span>
        <span class="county-chip-clear" id="county-chip-clear" title="Clear">×</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="sidebar-section" style="padding:0;">
      <div class="stats-strip">
        <div class="stat">
          <div class="stat-value" id="stat-props">—</div>
          <div class="stat-label">Properties</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-units">—</div>
          <div class="stat-label">Total Units</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-li">—</div>
          <div class="stat-label">LI Units</div>
        </div>
      </div>
    </div>

    <!-- Target population chart -->
    <div class="sidebar-section">
      <div class="sidebar-label">Target Population</div>
      <div class="pop-chart" id="pop-chart"></div>
    </div>

    <!-- Layer toggles -->
    <div class="sidebar-section">
      <div class="sidebar-label">Layers</div>
      <div class="layer-toggle" id="toggle-lihtc">
        <div class="layer-swatch lihtc-swatch"></div>
        <span class="layer-name">LIHTC Properties</span>
        <span class="layer-badge" id="badge-lihtc">—</span>
      </div>
      <div class="layer-toggle" id="toggle-clt">
        <div class="layer-swatch clt-swatch"></div>
        <span class="layer-name">CLT / Shared Equity</span>
        <span class="layer-badge" id="badge-clt">—</span>
      </div>
    </div>

  </aside>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-label">Fetching data…</div>
  </div>
  <div id="error-banner"></div>

  <div id="map"></div>

  <footer>
    <span>HUD LIHTC Database · US Census Bureau · © OpenStreetMap contributors</span>
    <span id="zoom-badge">Z —</span>
  </footer>

</div>

<script>
  // ── Config ───────────────────────────────────────────────────────────────────
  const QUERY_URL  = 'https://services.arcgis.com/VTyQ9soqVukalItT/arcgis/rest/services/LIHTC/FeatureServer/0/query';
  const PAGE_SIZE  = 1000;
  const COUNTY_URL = 'https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json';
  // Census Bureau TIGER/Line via ArcGIS REST — Maryland state boundary, high resolution
  const STATE_URL  = 'https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/State_County/MapServer/0/query?where=STATE%3D%2724%27&outFields=NAME&f=geojson&outSR=4326';
  const MD_FIPS    = '24';
  const CLT_URL    = 'https://services7.arcgis.com/b0ChUcNctftqFc2H/arcgis/rest/services/CLT_SE_Organization_Points_(Production)/FeatureServer/0/query';

  // State boundary style constants
  const STATE_STYLE_FULL = { color: '#1a1a18', weight: 1.5, opacity: 0.4, fill: false };
  const STATE_STYLE_FADE = { color: '#1a1a18', weight: 1,   opacity: 0.1, fill: false };

  // Maryland counties — the LIHTC data uses PROJ_CTY which stores city names,
  // not county names directly. We match against CURCNTY_NM which is the
  // Census county name field confirmed in the API schema.
  const MD_COUNTIES = [
    'Allegany','Anne Arundel','Baltimore','Baltimore City',
    'Calvert','Caroline','Carroll','Cecil','Charles',
    'Dorchester','Frederick','Garrett','Harford','Howard',
    'Kent','Montgomery',"Prince George's","Queen Anne's",
    "Saint Mary's",'Somerset','Talbot','Washington',
    'Wicomico','Worcester',
  ];

  // ── Map ──────────────────────────────────────────────────────────────────────
  const map = L.map('map', {
    center: [39.0, -76.8], zoom: 8,
    zoomControl: false, attributionControl: false,
  });
  L.tileLayer('https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('zoomend', () => {
    document.getElementById('zoom-badge').textContent = `Z ${map.getZoom()}`;
  });
  document.getElementById('zoom-badge').textContent = `Z ${map.getZoom()}`;

  // ── LIHTC marker color by target population (priority order) ───────────────
  const POP_COLORS = [
    { field: 'TRGT_HML',   color: '#6b4c9a', label: 'Homeless'   },
    { field: 'TRGT_DIS',   color: '#2a6096', label: 'Disability' },
    { field: 'TRGT_ELD',   color: '#2e8b6e', label: 'Elderly'    },
    { field: 'TRGT_FAM',   color: '#b85c38', label: 'Families'   },
    { field: 'TRGT_OTHER', color: '#8a8880', label: 'Other'      },
  ];
  const POP_COLOR_NONE = '#c4b8a0'; // no flag set

  function getMarkerColor(p) {
    for (const { field, color } of POP_COLORS) {
      if (p[field] === '1' || p[field] === 1) return color;
    }
    return POP_COLOR_NONE;
  }

  function getMarkerIcon(p) {
    const color = getMarkerColor(p);
    return L.divIcon({
      className: '',
      html: `<div style="
        width:8px;height:8px;border-radius:50%;
        background:${color};
        border:1.5px solid #f4f1ea;
        box-shadow:0 0 0 1px ${color};
      "></div>`,
      iconSize: [8, 8], iconAnchor: [4, 4], popupAnchor: [0, -8],
    });
  }

  // ── State ────────────────────────────────────────────────────────────────────
  let allFeatures    = [];     // all MD LIHTC features fetched from API
  let markerGroup    = L.layerGroup().addTo(map);  // current visible markers
  let cltFeatures    = [];     // all MD CLT features
  let cltGroup       = L.layerGroup().addTo(map);  // CLT markers
  let cltVisible     = true;   // CLT layer toggle state
  let countyData     = null;   // GeoJSON for MD county boundaries
  let countyLayer    = null;   // active boundary highlight layer
  let stateLayer     = null;   // Maryland state boundary layer
  let selectedCounty = null;   // currently selected county name

  // ── CLT marker icon (blue, diamond shape) ────────────────────────────────────
  const cltIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:0;height:0;
      border-left:7px solid transparent;
      border-right:7px solid transparent;
      border-bottom:13px solid #2a6096;
      filter:drop-shadow(0 0 0 1px #2a6096);
    "></div>`,
    iconSize: [14, 13], iconAnchor: [7, 6], popupAnchor: [0, -10],
  });

  // ── Fetch LIHTC data ─────────────────────────────────────────────────────────
  async function fetchAllFeatures() {
    const features = [];
    let offset = 0, hasMore = true;

    while (hasMore) {
      const params = new URLSearchParams({
        where: `PROJ_ST='MD'`, outFields: '*',
        f: 'geojson', outSR: '4326',
        resultRecordCount: PAGE_SIZE, resultOffset: offset,
      });
      const res  = await fetch(`${QUERY_URL}?${params}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const valid = (data.features || []).filter(f =>
        f.geometry?.coordinates?.[0] != null && f.geometry?.coordinates?.[1] != null
      );
      features.push(...valid);
      hasMore = (data.features || []).length === PAGE_SIZE;
      offset += PAGE_SIZE;
    }
    return features;
  }

  // ── Fetch CLT/SE data for Maryland ───────────────────────────────────────────
  // Field names based on Grounded Solutions schema — state field candidates checked at runtime
  // Console will log available fields if state filter fails
  async function fetchCLTFeatures() {
    // Try common state field names in order
    const stateFields = ['State', 'STATE', 'state', 'State_Abbr', 'STATE_ABBR'];
    let features = [];

    for (const field of stateFields) {
      try {
        const params = new URLSearchParams({
          where:             `${field}='MD'`,
          outFields:         '*',
          f:                 'geojson',
          outSR:             '4326',
          resultRecordCount: 2000,
        });
        const res  = await fetch(`${CLT_URL}?${params}`);
        if (!res.ok) continue;
        const data = await res.json();
        if (data.error) continue;

        features = (data.features || []).filter(f =>
          f.geometry?.coordinates?.[0] != null && f.geometry?.coordinates?.[1] != null
        );

        if (features.length > 0) {
          console.log(`CLT: state field "${field}" matched ${features.length} records`);
          // Log all available fields for debugging
          if (features[0]) console.log('CLT fields:', Object.keys(features[0].properties));
          break;
        }
      } catch (e) { continue; }
    }

    // Fallback: fetch all and filter client-side if no state field worked
    if (features.length === 0) {
      console.warn('CLT: no state field matched, fetching all and filtering client-side');
      try {
        const params = new URLSearchParams({
          where: '1=1', outFields: '*', f: 'geojson', outSR: '4326', resultRecordCount: 2000,
        });
        const res  = await fetch(`${CLT_URL}?${params}`);
        const data = await res.json();
        if (!data.error && data.features) {
          console.log('CLT all fields:', Object.keys(data.features[0]?.properties || {}));
          // Try to find MD by any field containing state info
          features = data.features.filter(f => {
            const p = f.properties;
            return Object.values(p).some(v => v === 'MD' || v === 'Maryland');
          }).filter(f => f.geometry?.coordinates?.[0] != null);
        }
      } catch(e) { console.error('CLT fallback fetch failed:', e); }
    }

    return features;
  }

  // ── CLT popup builder ─────────────────────────────────────────────────────────
  function cltPopupHtml(p) {
    // Field names based on Grounded Solutions 2022 census schema
    // Console log above will show actual names if these need updating
    const name   = p.Organization_Name || p.Org_Name || p.NAME || p.name || 'Unnamed Organization';
    const city   = p.City || p.CITY || p.city || '';
    const state  = p.State || p.STATE || p.state || '';
    const type   = p.Organization_Type || p.Org_Type || p.Type || p.TYPE || '';
    const status = p.Program_Status || p.Status || p.STATUS || '';
    const units  = p.Total_Units || p.Units || p.UNITS || null;
    const web    = p.Website || p.URL || p.website || null;

    return `
      <div class="popup-inner">
        <div class="popup-name" style="color:#2a6096">${name}</div>
        ${city || state ? `<div class="popup-row"><span>Location</span><span>${[city,state].filter(Boolean).join(', ')}</span></div>` : ''}
        ${type   ? `<div class="popup-row"><span>Type</span><span>${type}</span></div>` : ''}
        ${status ? `<div class="popup-row"><span>Status</span><span>${status}</span></div>` : ''}
        ${units  != null ? `<div class="popup-row"><span>Units</span><span>${units}</span></div>` : ''}
        ${web    ? `<div class="popup-row"><span>Website</span><span><a href="${web}" target="_blank" style="color:#2a6096">${web}</a></span></div>` : ''}
        <div class="popup-tags"><span class="popup-tag" style="background:#2a6096;border-color:#2a6096;color:#f4f1ea">CLT / Shared Equity</span></div>
      </div>`;
  }

  // ── Render CLT markers ────────────────────────────────────────────────────────
  function renderCLT(features) {
    cltGroup.clearLayers();
    if (!cltVisible) return;
    features.forEach(({ geometry, properties: p }) => {
      const [lng, lat] = geometry.coordinates;
      L.marker([lat, lng], { icon: cltIcon })
        .bindPopup(cltPopupHtml(p), { maxWidth: 280, closeButton: true })
        .addTo(cltGroup);
    });
    cltGroup.eachLayer(l => l.setZIndexOffset && l.setZIndexOffset(1000));
  }

  // ── Fetch county boundaries ──────────────────────────────────────────────────
  fetch(COUNTY_URL)
    .then(r => r.json())
    .then(data => {
      countyData = {
        type: 'FeatureCollection',
        features: data.features.filter(f => String(f.id).startsWith(MD_FIPS)),
      };
    })
    .catch(() => { countyData = null; });

  // ── Fetch and render Maryland state boundary ────────────────────────────────
  // Census TIGERweb endpoint returns Maryland geometry directly — no filtering needed
  fetch(STATE_URL)
    .then(r => r.json())
    .then(data => {
      if (!data.features || !data.features.length) return;
      stateLayer = L.geoJSON(data, { style: STATE_STYLE_FULL }).addTo(map);
    })
    .catch(() => { stateLayer = null; });

  // ── Animate state boundary opacity ───────────────────────────────────────────
  function animateStateBoundary(toFull) {
    if (!stateLayer) return;
    const from   = toFull ? STATE_STYLE_FADE.opacity : STATE_STYLE_FULL.opacity;
    const to     = toFull ? STATE_STYLE_FULL.opacity  : STATE_STYLE_FADE.opacity;
    const fromW  = toFull ? STATE_STYLE_FADE.weight   : STATE_STYLE_FULL.weight;
    const toW    = toFull ? STATE_STYLE_FULL.weight   : STATE_STYLE_FADE.weight;
    const steps  = 20;
    const dur    = 400; // ms
    let   step   = 0;
    const tick   = dur / steps;

    const timer = setInterval(() => {
      step++;
      const t = step / steps;
      stateLayer.setStyle({ opacity: from + (to - from) * t, weight: fromW + (toW - fromW) * t });
      if (step >= steps) {
        clearInterval(timer);
        stateLayer.setStyle(toFull ? STATE_STYLE_FULL : STATE_STYLE_FADE);
      }
    }, tick);
  }

  // ── Normalise county name for matching ───────────────────────────────────────
  function normalise(s) {
    return (s || '').toLowerCase()
      .replace(/\s+county$/i, '')
      .replace(/\bsaint\b/i, 'st')
      .replace(/['.]/g, '')
      .trim();
  }

  // ── Popup builder ─────────────────────────────────────────────────────────────
  function popupHtml(p) {
    const name       = p.PROJECT || 'Unnamed Project';
    const addr       = [p.PROJ_ADD, p.PROJ_CTY, p.PROJ_ST, p.PROJ_ZIP].filter(Boolean).join(', ') || '—';
    const units      = p.N_UNITS  ?? '—';
    const liUnits    = p.LI_UNITS ?? '—';
    const yr         = p.YR_PIS   || '—';
    const credit     = String(p.CREDIT ?? '');
    const type       = String(p.TYPE   ?? '');
    const creditLabel = credit === '1' ? '9% Credit' : credit === '2' ? '4% Credit' : credit === '3' ? 'Both Credits' : '—';
    const typeLabel   = type   === '1' ? 'New Construction' : type === '2' ? 'Rehabilitation' : type === '3' ? 'Both' : null;

    return `
      <div class="popup-inner">
        <div class="popup-name">${name}</div>
        <div class="popup-row"><span>Address</span><span>${addr}</span></div>
        <div class="popup-row"><span>Total Units</span><span>${units}</span></div>
        <div class="popup-row"><span>Low-Income Units</span><span>${liUnits}</span></div>
        <div class="popup-row"><span>Year Placed</span><span>${yr}</span></div>
        <div class="popup-row"><span>Credit Type</span><span>${creditLabel}</span></div>
        <div class="popup-row"><span>HUD ID</span><span>${p.HUD_ID || '—'}</span></div>
        <div class="popup-tags">
          ${typeLabel   ? `<span class="popup-tag accent">${typeLabel}</span>`   : ''}
          ${creditLabel !== '—' ? `<span class="popup-tag">${creditLabel}</span>` : ''}
        </div>
      </div>`;
  }

  // ── Render target population chart ───────────────────────────────────────────
  function renderPopChart(features) {
    const chartEl = document.getElementById('pop-chart');
    chartEl.innerHTML = '';

    const total = features.length;
    if (total === 0) {
      chartEl.innerHTML = '<div class="pop-none">No data</div>';
      return;
    }

    // Count projects where each flag === '1'
    const counts = POP_COLORS.map(({ field, label, color }) => {
      const n = features.filter(f => {
        const v = f.properties[field];
        return v === '1' || v === 1;
      }).length;
      return { label, color, n, pct: total > 0 ? (n / total * 100) : 0 };
    });

    // Also count untagged
    const nNone = features.filter(f => {
      const p = f.properties;
      return !POP_COLORS.some(({ field }) => p[field] === '1' || p[field] === 1);
    }).length;
    counts.push({ label: 'No Flag', color: POP_COLOR_NONE, n: nNone, pct: nNone / total * 100 });

    // Sort descending
    counts.sort((a, b) => b.pct - a.pct);

    counts.forEach(({ label, color, n, pct }) => {
      if (n === 0) return; // skip empty categories
      const row = document.createElement('div');
      row.className = 'pop-row';
      row.innerHTML = `
        <div class="pop-header">
          <div style="display:flex;align-items:center;gap:5px;">
            <div style="width:7px;height:7px;border-radius:50%;background:${color};box-shadow:0 0 0 1px ${color};flex-shrink:0;"></div>
            <span class="pop-name">${label}</span>
          </div>
          <span class="pop-pct">${pct.toFixed(0)}% · ${n}</span>
        </div>
        <div class="pop-track">
          <div class="pop-fill" style="width:0%;background:${color};"></div>
        </div>`;
      chartEl.appendChild(row);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          row.querySelector('.pop-fill').style.width = `${pct}%`;
        });
      });
    });
  }

  // ── Render markers for a given feature set ────────────────────────────────────
  function renderMarkers(features) {
    markerGroup.clearLayers();
    let totalUnits = 0, totalLI = 0;

    features.forEach(({ geometry, properties: p }) => {
      const [lng, lat] = geometry.coordinates;
      totalUnits += p.N_UNITS  || 0;
      totalLI    += p.LI_UNITS || 0;
      L.marker([lat, lng], { icon: getMarkerIcon(p) })
        .bindPopup(popupHtml(p), { maxWidth: 280, closeButton: true })
        .addTo(markerGroup);
    });

    // Update header count and stats strip
    document.getElementById('count').textContent =
      selectedCounty
        ? `${features.length.toLocaleString()} in ${selectedCounty} County`
        : `${features.length.toLocaleString()} properties`;

    document.getElementById('stat-props').textContent = features.length.toLocaleString();
    document.getElementById('badge-lihtc').textContent = features.length.toLocaleString();
    renderPopChart(features);
    document.getElementById('stat-units').textContent = totalUnits.toLocaleString();
    document.getElementById('stat-li').textContent    = totalLI.toLocaleString();
  }

  // ── Filter features by selected county ───────────────────────────────────────
  // Uses CURCNTY_NM (Census county name) confirmed in API schema
  function filterByCounty(countyName) {
    if (!countyName) return allFeatures;
    const target = normalise(countyName);
    return allFeatures.filter(f => {
      const cnm = normalise(f.properties.CURCNTY_NM || '');
      return cnm === target;
    });
  }

  // ── County boundary highlight ─────────────────────────────────────────────────
  function highlightCounty(name) {
    if (countyLayer) { map.removeLayer(countyLayer); countyLayer = null; }
    if (!countyData || !name) return;

    const target  = normalise(name);
    const matched = {
      type: 'FeatureCollection',
      features: countyData.features.filter(f => normalise(f.properties.NAME || '') === target),
    };
    if (!matched.features.length) return;

    countyLayer = L.geoJSON(matched, {
      style: { color: '#b85c38', weight: 2, opacity: 1, fillColor: '#b85c38', fillOpacity: 0.07 },
    }).addTo(map);

    // Ensure county layer renders above state boundary
    countyLayer.bringToFront();
    animateStateBoundary(false);  // fade the state boundary

    map.fitBounds(countyLayer.getBounds(), { padding: [40, 40] });
  }

  function clearCounty() {
    if (countyLayer) { map.removeLayer(countyLayer); countyLayer = null; }
    selectedCounty = null;
    document.getElementById('county-chip').classList.remove('visible');
    document.getElementById('county-search').value = '';
    document.getElementById('county-results').classList.remove('visible');
    document.getElementById('county-results').innerHTML = '';
    renderMarkers(allFeatures);
    renderCLT(cltFeatures);
    document.getElementById('badge-clt').textContent = cltFeatures.length.toLocaleString();
    animateStateBoundary(true);   // restore state boundary
    // Reset to full MD view
    map.setView([39.0, -76.8], 8);
  }

  // ── County search UI ──────────────────────────────────────────────────────────
  const countySearchEl  = document.getElementById('county-search');
  const countyResultsEl = document.getElementById('county-results');
  const countyChipEl    = document.getElementById('county-chip');
  const countyChipName  = document.getElementById('county-chip-name');

  countySearchEl.addEventListener('input', () => {
    const q = countySearchEl.value.trim().toLowerCase();
    countyResultsEl.innerHTML = '';
    if (!q) { countyResultsEl.classList.remove('visible'); return; }

    const matches = MD_COUNTIES.filter(c => c.toLowerCase().includes(q));
    if (!matches.length) { countyResultsEl.classList.remove('visible'); return; }

    matches.forEach(county => {
      const item = document.createElement('div');
      item.className = 'county-result-item' + (county === selectedCounty ? ' selected' : '');
      item.textContent = county === 'Baltimore City' ? 'Baltimore City' : county + ' County';
      item.addEventListener('click', () => {
        selectedCounty = county;
        countySearchEl.value = '';
        countyResultsEl.classList.remove('visible');
        countyResultsEl.innerHTML = '';
        countyChipName.textContent = item.textContent;
        countyChipEl.classList.add('visible');
        highlightCounty(county);
        renderMarkers(filterByCounty(county));
        renderCLT(filterCLTByCounty(county));
        document.getElementById('badge-clt').textContent = filterCLTByCounty(county).length.toLocaleString();
      });
      countyResultsEl.appendChild(item);
    });

    countyResultsEl.classList.add('visible');
  });

  document.addEventListener('click', e => {
    if (!countySearchEl.contains(e.target) && !countyResultsEl.contains(e.target)) {
      countyResultsEl.classList.remove('visible');
    }
  });

  document.getElementById('county-chip-clear').addEventListener('click', clearCounty);

  // ── Layer toggle UI ──────────────────────────────────────────────────────────
  let lihtcVisible = true;

  document.getElementById('toggle-lihtc').addEventListener('click', () => {
    lihtcVisible = !lihtcVisible;
    document.getElementById('toggle-lihtc').classList.toggle('off', !lihtcVisible);
    if (lihtcVisible) {
      renderMarkers(selectedCounty ? filterByCounty(selectedCounty) : allFeatures);
    } else {
      markerGroup.clearLayers();
    }
  });

  document.getElementById('toggle-clt').addEventListener('click', () => {
    cltVisible = !cltVisible;
    document.getElementById('toggle-clt').classList.toggle('off', !cltVisible);
    renderCLT(selectedCounty ? filterCLTByCounty(selectedCounty) : cltFeatures);
  });

  // ── Filter CLT by county ──────────────────────────────────────────────────────
  function filterCLTByCounty(countyName) {
    if (!countyName) return cltFeatures;
    const target = normalise(countyName);
    return cltFeatures.filter(f => {
      const p = f.properties;
      // Check common county field names
      const county = p.County || p.COUNTY || p.county || p.County_Name || '';
      const city   = p.City   || p.CITY   || p.city   || '';
      return normalise(county) === target;
    });
  }

  // ── Main ──────────────────────────────────────────────────────────────────────
  (async () => {
    const loadingEl = document.getElementById('loading');
    const countEl   = document.getElementById('count');
    const errorEl   = document.getElementById('error-banner');

    try {
      // Fetch both datasets in parallel
      [allFeatures, cltFeatures] = await Promise.all([
        fetchAllFeatures(),
        fetchCLTFeatures().catch(e => { console.warn('CLT fetch failed:', e); return []; }),
      ]);

      loadingEl.classList.add('hidden');
      setTimeout(() => loadingEl.style.display = 'none', 400);

      renderMarkers(allFeatures);
      renderCLT(cltFeatures);
      cltGroup.eachLayer(l => l.setZIndexOffset && l.setZIndexOffset(1000));

      document.getElementById('badge-clt').textContent = cltFeatures.length.toLocaleString();

    } catch (err) {
      loadingEl.style.display = 'none';
      countEl.textContent = 'Error';
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      console.error(err);
    }
  })();
</script>
</body>
</html>
