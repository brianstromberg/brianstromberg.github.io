<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affordable Housing Projects — Montgomery County, MD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.bunny.net/css?family=dm-mono:400,500|fraunces:300,300i,400|alexandria:400,400i&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #000000;
      --paper:   #f4f1ea;
      --card:    #edeae2;
      --muted:   #8a8880;
      --accent:  #b85c38;
      --rule:    rgba(26,26,24,.12);
      --sidebar: 300px;
    }

    html, body { width: 100%; height: 100%; background: var(--paper); font-family: 'DM Mono', monospace; color: var(--ink); }

    /* ── Layout ── */
    .shell {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      grid-template-rows: 48px 1fr 32px;
      grid-template-areas:
        "header header"
        "sidebar map"
        "footer footer";
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      grid-area: header;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
      z-index: 1000;
    }
    .brand { font-family: 'alexandria'; text-transform: uppercase; font-weight: 300; font-size: 17px; color: var(--ink)}
    .brand em { font-style: italic; color: var(--accent); }
    .meta { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }

    /* ── Sidebar ── */
    aside {
      grid-area: sidebar;
      border-right: 1px solid var(--rule);
      overflow-y: auto;
      background: var(--paper);
      scrollbar-width: none;
      z-index: 500;
    }
    aside::-webkit-scrollbar { display: none; }

    .sidebar-section { padding: 16px 20px; border-bottom: 1px solid var(--rule); }
    .sidebar-label {
      font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }

    /* ── Search input ── */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 8px 10px 8px 28px;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 3px;
      font-family: 'DM Mono';
      font-size: 11px;
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap::before {
      content: '⌕';
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      font-size: 13px; color: var(--muted); pointer-events: none;
    }

    /* ── County dropdown ── */
    .county-results {
      margin-top: 6px;
      border: 1px solid var(--rule);
      border-radius: 3px;
      background: var(--paper);
      overflow: hidden;
      display: none;
    }
    .county-results.visible { display: block; }
    .county-result-item {
      padding: 8px 12px;
      font-size: 11px;
      cursor: pointer;
      border-bottom: 1px solid var(--rule);
      transition: background .1s;
    }
    .county-result-item:last-child { border-bottom: none; }
    .county-result-item:hover { background: var(--card); }
    .county-result-item.selected { color: var(--accent); background: var(--card); }

    /* ── County chip ── */
    .county-chip {
      display: none;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 5px 10px;
      background: var(--accent);
      border-radius: 3px;
      font-size: 10px;
      color: var(--paper);
      letter-spacing: .04em;
    }
    .county-chip.visible { display: flex; }
    .county-chip-clear {
      cursor: pointer; font-size: 14px; line-height: 1;
      opacity: .7; margin-left: 8px;
    }
    .county-chip-clear:hover { opacity: 1; }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex; gap: 0;
    }
    .stat {
      flex: 1;
      padding: 10px 12px;
      border-right: 1px solid var(--rule);
    }
    .stat:last-child { border-right: none; }
    .stat-value { font-size: 16px; font-family: 'Fraunces', serif; font-weight: 300; color: var(--ink); }
    .stat-label { font-size: 8px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }

    /* ── Map ── */
    #map { grid-area: map; width: 100%; height: 100%; }

    /* ── Loading overlay ── */
    #loading {
      position: absolute;
      inset: 48px 0 32px var(--sidebar);
      background: var(--paper);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 2000;
      pointer-events: none;
      transition: opacity .4s ease;
    }
    #loading.hidden { opacity: 0; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      position: absolute;
      top: 60px; left: calc(var(--sidebar) + 20px);
      background: var(--ink); color: var(--paper);
      padding: 8px 16px; font-size: 10px; letter-spacing: .06em;
      border-radius: 3px; z-index: 3000;
    }

    /* ── Marker dot — color set inline per feature ── */
    .dot-marker { transition: transform .12s ease; }
    .dot-marker:hover { transform: scale(1.6); }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: var(--paper) !important;
      border: 1px solid var(--rule) !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 24px rgba(26,26,24,.12) !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { top: 8px !important; right: 8px !important; color: var(--muted) !important; font-size: 14px !important; }
    .popup-inner { padding: 14px 18px 12px; min-width: 200px; max-width: 320px; }
    .popup-name {
      font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400;
      color: var(--ink); margin-bottom: 6px; padding-right: 16px; line-height: 1.3;
    }
    .popup-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      font-size: 10px; color: var(--muted); letter-spacing: .04em;
      padding: 3px 0; border-bottom: 1px solid var(--rule);
    }
    .popup-row:last-of-type { border-bottom: none; }
    .popup-row span:last-child { color: var(--ink); font-weight: 500; padding-left:8px}
    .popup-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .popup-tag {
      display: inline-block; padding: 2px 6px;
      background: var(--card); border: 1px solid var(--rule);
      border-radius: 2px; font-size: 8px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
    }
    .popup-tag.accent { background: var(--accent); border-color: var(--accent); color: var(--paper); }

    /* ── Leaflet chrome ── */
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom {
      border: 1px solid var(--rule) !important; border-radius: 4px !important; box-shadow: none !important;
    }
    .leaflet-control-zoom a {
      background: var(--paper) !important; color: var(--ink) !important;
      border-bottom: 1px solid var(--rule) !important;
      font-family: 'DM Mono', monospace !important;
      font-size: 16px !important; line-height: 28px !important;
      width: 28px !important; height: 28px !important;
    }
    .leaflet-control-zoom a:hover { background: var(--ink) !important; color: var(--paper) !important; }
    .leaflet-control-zoom-out { border-bottom: none !important; }

    /* ── Footer ── */
    footer {
      grid-area: footer;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-top: 1px solid var(--rule); background: var(--paper);
    }
    footer span { font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    /* ── Population chart ── */
    .pop-chart { display: flex; flex-direction: column; gap: 7px; }
    .pop-row { display: flex; flex-direction: column; gap: 3px; }
    .pop-header { display: flex; justify-content: space-between; align-items: baseline; }
    .pop-name { font-size: 9px; letter-spacing: .04em; color: var(--ink); text-transform: uppercase; }
    .pop-pct  { font-size: 9px; color: var(--muted); }
    .pop-track {
      height: 4px; background: var(--card);
      border-radius: 2px; overflow: hidden;
    }
    .pop-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px;
      transition: width .45s cubic-bezier(.4,0,.2,1);
    }
    .pop-none { font-size: 10px; color: var(--muted); font-style: italic; }

    /* ── Layer toggles ── */
    .layer-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      transition: opacity .12s;
    }
    .layer-toggle:last-child { border-bottom: none; }
    .layer-toggle:hover { opacity: .7; }
    .layer-toggle.off { opacity: .35; }
    .layer-swatch {
      width: 10px; height: 10px; flex-shrink: 0; border-radius: 50%;
    }
    .lihtc-swatch { background: transparent; border: 1.5px solid var(--ink); box-shadow: none; }
    .clt-swatch {
      background: #2a6096;
      border-radius: 0;
      width: 10px; height: 10px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      box-shadow: none;
    }
    .layer-name { font-size: 11px; flex: 1; }
    .layer-badge { font-size: 9px; color: var(--muted); letter-spacing: .06em; }
  </style>
</head>

se":"New Construction/ Production","units":"184 total units: 19 efficiencies, 56 1-br, 56 2-br, 53 3-br","affordability":"184 affordable units: 15 at 40% of AMI, 15 at 50% of AMI, 73 at 60% of AMI, 71 at 65% of AMI","special":"","loan":"$30,143,156.00","pilot":"TBD","source":"HIF-CIP + PILOT (By-Right)","closed":"FY28","notes":""},{"name":"Strathmore Square Lot 2","address":"Grosvenor-Strathmore Metro Station, Lot 2, North Bethesda, MD 20852","lat":39.0455,"lng":-77.1073,"status":"Fallback-LandmarkCoords","developer":"Enterprise Community Development, Inc.","use":"New Construction/ Production","units":"398 total units","affordability":"100 affordable units: at 50% to 70% AMI","special":"","loan":"$10,000,000.00","pilot":"","source":"HIF","closed":"FY28","notes":""},{"name":"Victory Station","address":"530 Stone Street, Rockville, MD 20850","lat":39.090485,"lng":-77.150097,"status":"Manual lookup (530 N Stonestreet Ave)","developer":"Victory Housing Inc","use":"New Construction/ Production","units":"105 total units","affordability":"101 affordable units: 101 at 30% and 60% of AMI, and 4 units at 80% and 100% AMI","special":"","loan":"$28,000,000.00","pilot":"","source":"HIF-CIP","closed":"July 2027","notes":""}];
  // Montgomery County, MD centroid (used as fallback for unmappable rows)
  const COUNTY_CENTROID = [39.0996, -77.2513];

  // ── Map ──────────────────────────────────────────────────────────────────────
  // Center on Montgomery County, MD
  const map = L.map('map', {
    center: [39.15, -77.20], zoom: 11,
    zoomControl: false, attributionControl: false,
  });
  L.tileLayer('https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('zoomend', () => {
    document.getElementById('zoom-badge').textContent = `Z ${map.getZoom()}`;
  });
  document.getElementById('zoom-badge').textContent = `Z ${map.getZoom()}`;

  // ── Marker layer ─────────────────────────────────────────────────────────────
  const markerGroup = L.layerGroup().addTo(map);

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>\"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;', "'": '&#39;',
    }[c]));
  }

  function popupHtml(p) {
    const row = (label, value) => {
      const v = (value ?? '').toString().trim();
      if (!v || v.toLowerCase() === 'n/a') return '';
      return `<div class="popup-row"><span>${label}</span><span>${escapeHtml(v)}</span></div>`;
    };
    const fallback = p.status && p.status.toLowerCase().includes('centroid')
      ? `<div class="popup-tags"><span class="popup-tag">approx. location</span></div>`
      : '';
    return `
      <div class="popup-inner">
        <div class="popup-name">${escapeHtml(p.name || 'Unnamed Project')}</div>
        ${row('Address',       p.address)}
        ${row('Developer',     p.developer)}
        ${row('Use of Funds',  p.use)}
        ${row('Unit Mix',      p.units)}
        ${row('Affordability', p.affordability)}
        ${row('Special Needs', p.special)}
        ${row('Loan Amount',   p.loan)}
        ${row('PILOT',         p.pilot)}
        ${row('Source',        p.source)}
        ${row('Loan Closed',   p.closed)}
        ${row('Notes',         p.notes)}
        ${fallback}
      </div>`;
  }

  // ── Jitter overlapping points ────────────────────────────────────────────────
  // Many projects share the same county-centroid coordinate. Spread them in a
  // small ring so each remains clickable. Pure visual; the underlying data is
  // unchanged.
  function jitterPositions(projects) {
    const groups = new Map();
    projects.forEach((p, i) => {
      const key = `${p.lat.toFixed(4)},${p.lng.toFixed(4)}`;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(i);
    });
    const positions = projects.map(p => [p.lat, p.lng]);
    groups.forEach(indices => {
      if (indices.length < 2) return;
      const radius = 0.004; // ~450 m
      indices.forEach((idx, k) => {
        const angle = (k / indices.length) * 2 * Math.PI;
        positions[idx] = [
          projects[idx].lat + radius * Math.cos(angle),
          projects[idx].lng + radius * Math.sin(angle),
        ];
      });
    });
    return positions;
  }

  // ── Render markers as simple black dots ──────────────────────────────────────
  function renderMarkers(projects) {
    markerGroup.clearLayers();
    const positions = jitterPositions(projects);
    projects.forEach((p, i) => {
      const [lat, lng] = positions[i];
      L.circleMarker([lat, lng], {
        radius:      5,
        color:       '',
        weight:      1,
        fillColor:   '#a4a5e7',
        fillOpacity: 1,
      })
        .bindPopup(popupHtml(p), { maxWidth: 300, closeButton: true })
        .addTo(markerGroup);
    });

    // Header count
    document.getElementById('count').textContent =
      `${projects.length.toLocaleString()} projects`;

    // Stats: count + total loan amount (parsed from currency strings)
    const totalLoan = projects.reduce((sum, p) => {
      const m = (p.loan || '').match(/[\d,.]+/);
      if (!m) return sum;
      const n = parseFloat(m[0].replace(/,/g, ''));
      return Number.isFinite(n) ? sum + n : sum;
    }, 0);
    document.getElementById('stat-props').textContent = projects.length.toLocaleString();
    document.getElementById('stat-loan').textContent  =
      totalLoan > 0 ? '$' + (totalLoan / 1e6).toFixed(0) + 'M' : '—';

    renderStatusChart(projects);
    renderUseChart(projects);
    renderAffordableUnitBuckets(projects);
  }

  // ── Sidebar charts ───────────────────────────────────────────────────────────
  function renderBarChart(elId, items) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.innerHTML = '';
    const total = items.reduce((s, it) => s + it.n, 0);
    if (total === 0) {
      el.innerHTML = '<div class="pop-none">No data</div>';
      return;
    }
    items.sort((a, b) => b.n - a.n);
    items.forEach(({ label, n, color }) => {
      if (n === 0) return;
      const pct = (n / total) * 100;
      const row = document.createElement('div');
      row.className = 'pop-row';
      row.innerHTML = `
        <div class="pop-header">
          <div style="display:flex;align-items:center;gap:5px;">
            <div style="width:7px;height:7px;border-radius:50%;background:${color};box-shadow:0 0 0 1px ${color};flex-shrink:0;"></div>
            <span class="pop-name">${escapeHtml(label)}</span>
          </div>
          <span class="pop-pct">${pct.toFixed(0)}% · ${n}</span>
        </div>
        <div class="pop-track">
          <div class="pop-fill" style="width:0%;background:${color};"></div>
        </div>`;
      el.appendChild(row);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        row.querySelector('.pop-fill').style.width = `${pct}%`;
      }));
    });
  }

  function renderStatusChart(projects) {
    // Collapse the various statuses into three buckets
    const buckets = {
      'Geocoded':    { n: 0, color: '#1a1a18' },
      'Manual':      { n: 0, color: '#8a8880' },
      'Approximate': { n: 0, color: '#b85c38' },
    };
    projects.forEach(p => {
      const s = (p.status || '').toLowerCase();
      if (s.includes('centroid'))      buckets['Approximate'].n += 1;
      else if (s.includes('manual'))   buckets['Manual'].n      += 1;
      else                             buckets['Geocoded'].n    += 1;
    });
    const items = Object.entries(buckets).map(([label, v]) => ({ label, ...v }));
    renderBarChart('status-chart', items);
  }

  function renderUseChart(projects) {
    const counts = new Map();
    projects.forEach(p => {
      let use = (p.use || '').trim();
      if (!use) use = '—';
      counts.set(use, (counts.get(use) || 0) + 1);
    });
    const palette = ['#1a1a18','#b85c38','#2a6096','#2e8b6e','#6b4c9a','#8a8880','#c4b8a0','#a06820'];
    const items = Array.from(counts.entries()).map(([label, n], i) => ({
      label, n, color: palette[i % palette.length],
    }));
    renderBarChart('use-chart', items);
  }

  function renderAffordableUnitBuckets(projects) {
  // Define your buckets and their labels
  const buckets = [
    { label: '1–50 Units',      min: 1,   max: 50 },
    { label: '51–100 Units',    min: 51,  max: 100 },
    { label: '101–200 Units',   min: 101, max: 200 },
    { label: '201–400 Units',   min: 201, max: 400 },
    { label: '401+ Units',      min: 401, max: Infinity }
  ];

  // Initialize counts for each bucket
  const counts = buckets.map(b => ({ ...b, n: 0 }));
  
  const affordabilityRegex = /(\d+)/;

  // Iterate over projects and assign to buckets
  projects.forEach(p => {
    const rawText = p.affordability || '';
    const match = rawText.match(affordabilityRegex);
    const count = match ? parseInt(match[1], 10) : 0;

    if (count > 0) {
      const bucket = counts.find(b => count >= b.min && count <= b.max);
      if (bucket) {
        bucket.n += 1;
      }
    }
  });

  // Filter out empty buckets to keep the chart clean
  const items = counts.filter(b => b.n > 0).map(({ label, n, min, max }) => ({
    label,
    n,
    color: '#b85c38' // Your accent color, or you can map colors here
  }));

  // Render to the specific element ID
  renderBarChart('unit-bucket-chart', items);
}

  // ── Init ─────────────────────────────────────────────────────────────────────
  (() => {
    const loadingEl = document.getElementById('loading');
    const errorEl   = document.getElementById('error-banner');
    try {
      renderMarkers(PROJECTS);
      loadingEl.classList.add('hidden');
      setTimeout(() => loadingEl.style.display = 'none', 400);
    } catch (err) {
      loadingEl.style.display = 'none';
      document.getElementById('count').textContent = 'Error';
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      console.error(err);
    }
  })();
</script>
